<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TS-Memory</title>

</head>
<body>
    
    <main>
        <div class="settings-left">
            <div class="title">
                <h1 class="title__h1">Settings</h1>
                <div class="title__devider">
                    <img src="public/assets/devider-long.svg" alt="">
                </div>
            </div>
            
            <div class="settings-pick">

                <div class="themes">
                    <div class="themes__title">
                        <img class="themes__img" src="public/assets/palette.svg"><p class="themes__p">Game themes</p>
                    </div>

                    <div class="code-vibes">
                        <img src="public/assets/circle.svg">
                        <p>Code vibes</p>
                        <img class="line-short" src="public/assets/line-short.svg">
                    </div>

                    <div class="gaming-theme">
                        <img src="public/assets/circle.svg">
                        <p>Gaming theme</p>
                        <img class="line-short" src="public/assets/line-short.svg">
                    </div>
                </div>

                <div class="player">
                    <div class="player__title">
                        <img class="player__img" src="public/assets/chess_pawn.svg"><p class="player__p">Choose player</p>
                    </div>

                    <div class="player__blue">
                        <img src="public/assets/circle.svg">
                        <p>Blue</p>
                        <img class="line-short" src="public/assets/line-short.svg">
                    </div>

                    <div class="player__orange">
                        <img src="public/assets/circle.svg">
                        <p>Orange</p>
                        <img class="line-short" src="public/assets/line-short.svg">
                    </div>
                    
                </div>

                <div class="board">
                    <div class="board__title">
                        <img class="board__img" src="public/assets/board-size.svg"><p class="board__p">Board size</p>
                    </div>

                    <div class="board__16">
                        <img src="public/assets/circle.svg">
                        <p>16 cards</p>
                        <img class="line-short" src="public/assets/line-short.svg">
                    </div>

                    <div class="board__24">
                        <img src="public/assets/circle.svg">
                        <p>24 cards</p>
                        <img class="line-short" src="public/assets/line-short.svg">
                    </div>

                    <div class="board__36">
                        <img src="public/assets/circle.svg">
                        <p>36 cards</p>
                        <img class="line-short" src="public/assets/line-short.svg">
                    </div>
                    
                </div>

            </div>

        </div>

        <div class="settings-right">
            <div class="theme">
                <img class="theme__img" src="public/assets/code-vibes-theme.svg">
            </div>

            <div class="settings-info">
                <p class="settings-info__theme">Theme</p>
                <img class="settings-info__skew" src="public/assets/line-skew.svg">
                <p class="settings-info__player">Player</p>
                <img class="settings-info__skew" src="public/assets/line-skew.svg">
                <p class="settings-info__board">Board size</p>
                <img class="settings-info__start-btn" src="public/assets/start-btn-disabled.svg">
                
            </div>

        </div>
    </main>





    <script type="module" src="./src/ts/settings.ts"></script>
</body>
</html>
