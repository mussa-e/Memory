<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TS-Memory</title>
</head>
<body>

    <header class="header">
        <div class="header__left">
            <div>
                <img src="public/assets/code-vibes/blue-player-cv.svg">
                <p></p>
            </div>
            <div>
                <img src="public/assets/code-vibes/orange-player-cv.svg">
                <p></p>
            </div>
        </div>

        <div class="header__mid">
            <p>Current Player:</p><img src="public/assets/code-vibes/label-blue-cv.svg">
        </div>

        <div class="header__right">
            <img src="public/assets/code-vibes/exit-cv.svg">
        </div>
    </header>
        

    
    <section id="field">
        <button class="card">
            <div class="card__inner">
                <div class="card__face card__face--front"></div>
                <div class="card__face card__face--back"></div>
            </div>
        </button>
    </section>

    

    <script type="module" src="./src/ts/game.ts"></script>

</html>
